specVersion: "3.0"
metadata:
  name: ui5.odata.demo
type: application
framework:
  name: OpenUI5
  version: "1.150.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.table
    - name: sap.ui.unified
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: proxy-to-server
      afterMiddleware: compression
      mountPath: /odata
---
specVersion: "3.0"
kind: extension
type: server-middleware
metadata:
  name: proxy-to-server
middleware:
  path: middleware/proxy-to-server.js
